resources:
  jobs:
    qa_test_job:
      name: qa_test_job_${bundle.target}
      tasks:
      - task_key: run_tests
        notebook_task:
          notebook_path: ./code/notebooks/run_tests.py
        new_cluster:
          num_workers: 1
          spark_version: 13.3.x-scala2.12
          node_type_id: i3.xlarge
          spark_conf:
            spark.databricks.delta.preview.enabled: true